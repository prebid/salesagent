name: migration-audit
description: >
  Repeatable code review workflow for auditing migration changes. Inventories
  changed files by architectural layer, launches focused code reviews per layer,
  consolidates findings, and files beads issues for each finding. Designed to
  be re-run after each remediation batch to track progress.

variables:
  AUDIT_TARGET:
    description: "Git commit range, branch name, or 'full' for complete codebase audit (e.g., 'main..HEAD', 'KonstantinMirin/adcp-v3-upgrade', 'full')"
    required: true

labels:
  - "mol:migration-audit"

setup:
  # ── Atom 1: Inventory Changes ──────────────────────────────────
  - id: inventory-changes
    title: "Inventory changes for {AUDIT_TARGET}"
    description: |
      Catalog all changed files and classify them by architectural layer.

      ## Instructions

      1. **Get the change list**:
         - If {AUDIT_TARGET} is a commit range: `git diff --name-only {AUDIT_TARGET}`
         - If {AUDIT_TARGET} is a branch: `git diff --name-only main...{AUDIT_TARGET}`
         - If {AUDIT_TARGET} is "full": inventory all source files

      2. **Classify each file by layer**:

         | Layer | Path Pattern | Examples |
         |-------|-------------|---------|
         | Schema | src/core/schemas.py, adcp imports | Pydantic models, AdCP types |
         | Business | src/core/tools/*_impl, src/core/*.py | _impl functions, business logic |
         | Boundary | src/core/tools/*.py (wrappers), src/routes/ | MCP/A2A/REST wrappers |
         | Transport | src/core/main.py, src/core/a2a_*.py | Protocol-specific code |
         | Adapter | src/adapters/ | GAM, Mock adapter code |
         | Database | src/core/database/, alembic/ | Models, migrations |
         | Test | tests/ | All test files |

      3. **Record the inventory**:
         - Total files changed per layer
         - Files that span multiple layers (these are often where violations hide)

    acceptance: "All changed files classified by layer. Cross-layer files flagged."
    labels: ["atom:inventory"]

  # ── Atom 2: Review Per Layer ───────────────────────────────────
  - id: review-per-layer
    title: "Review each layer for {AUDIT_TARGET}"
    description: |
      For each architectural layer with changes, perform a focused code review.

      ## Review Checklist Per Layer

      ### Schema Layer
      - [ ] All schema classes extend correct adcp library base
      - [ ] No field duplication between schema and library base
      - [ ] `exclude=True` on all internal-only fields
      - [ ] `model_dump()` overrides for nested serialization (Critical Pattern #4)
      - [ ] Environment-based validation mode (Critical Pattern #7)

      ### Business Layer
      - [ ] No ToolError raises (use AdCPError subclasses)
      - [ ] No transport imports (fastmcp, a2a, starlette, fastapi)
      - [ ] All _impl functions accept `identity: ResolvedIdentity`
      - [ ] No authentication/authorization logic (belongs at boundary)
      - [ ] No return of error dicts — raise exceptions instead
      - [ ] No direct model_dump() calls (belongs at boundary)

      ### Boundary Layer
      - [ ] All _impl parameters exposed in wrapper signatures
      - [ ] Version compat applied as post-response transform
      - [ ] Error handling wraps _impl exceptions into protocol errors
      - [ ] No business logic in wrappers (just delegation)

      ### Transport Layer
      - [ ] Shared _impl pattern (Critical Pattern #5)
      - [ ] No business logic duplication across MCP/A2A/REST

      ### Database Layer
      - [ ] SQLAlchemy 2.0 patterns (select() + scalars())
      - [ ] JSONType for JSON columns
      - [ ] Column types match query patterns (string IDs vs int PKs)
      - [ ] Migrations are reversible

      ### Adapter Layer
      - [ ] No protocol-specific code
      - [ ] Proper error propagation (no silent failures)

      ## Instructions

      For each layer, read the changed files and check against the checklist.
      Record findings with severity (CRITICAL / HIGH / MEDIUM / LOW).

      Use subagents (feature-dev:code-reviewer) for large layers:
      ```
      Task: Review [layer] layer changes in {AUDIT_TARGET}
      ```

    acceptance: "Each layer with changes reviewed. Findings recorded with severity."
    depends_on: [inventory-changes]
    labels: ["atom:review"]

  # ── Atom 3: Consolidate ────────────────────────────────────────
  - id: consolidate
    title: "Consolidate audit findings for {AUDIT_TARGET}"
    description: |
      Merge findings across layers, deduplicate, cross-reference with
      existing beads issues and test obligations.

      ## Instructions

      1. **Merge findings** from all layer reviews
      2. **Deduplicate**: Same root cause found in multiple layers counts once
      3. **Cross-reference with existing beads issues**:
         ```bash
         bd list --status=open
         ```
         Mark findings that already have beads issues.
      4. **Cross-reference with test obligations**:
         Check if any finding corresponds to a test obligation that's currently
         a stub in an entity test suite.
      5. **Prioritize**:
         - CRITICAL: Data loss, security, complete feature broken
         - HIGH: Wrong behavior visible to users
         - MEDIUM: Violation of architecture principle, not user-visible yet
         - LOW: Code quality, style, minor inconsistency
      6. **Write consolidated report** to docs/code-reviews/

    acceptance: "Consolidated report written. Findings deduplicated and prioritized. Cross-references noted."
    depends_on: [review-per-layer]
    labels: ["atom:consolidate"]

  # ── Atom 4: File Issues ────────────────────────────────────────
  - id: file-issues
    title: "File beads issues for audit findings"
    description: |
      Create beads issues for each finding that doesn't already have one.

      ## Instructions

      1. **For each finding without an existing beads issue**:
         ```bash
         bd create --title="[severity]: [description]" \
           --type=bug --priority=[0-4 based on severity] \
           --description="Found during migration audit of {AUDIT_TARGET}.
         Layer: [layer]
         File: [path:line]
         Issue: [description]
         Expected: [what should happen]
         Actual: [what happens now]"
         ```

      2. **Priority mapping**:
         - CRITICAL → P0 or P1
         - HIGH → P1 or P2
         - MEDIUM → P2 or P3
         - LOW → P3 or P4

      3. **Record all filed issues**:
         ```bash
         bd update {AUDIT_TARGET}-audit --append-notes "## Filed Issues
         - salesagent-xxxx: [description] (CRITICAL)
         - salesagent-yyyy: [description] (HIGH)
         [repeat]

         ## Already Tracked
         - salesagent-zzzz: [existing issue that covers this finding]"
         ```

    acceptance: "Beads issues filed for all new findings. Existing issues cross-referenced."
    depends_on: [consolidate]
    labels: ["atom:file-issues", "atom:commit"]

finalize:
  - id: sync-and-report
    title: "Commit audit report"
    description: |
      Commit the audit report and sync beads.

      ## Instructions

      1. Stage audit documentation:
         ```bash
         git add docs/code-reviews/
         ```

      2. Commit:
         ```bash
         git commit -m "docs: migration audit for {AUDIT_TARGET}"
         ```

      3. Sync beads:
         ```bash
         bd sync --from-main
         ```

      4. Print summary:
         ```bash
         bd list --status=open --label "mol:migration-audit"
         ```

    acceptance: "Audit report committed. Beads synced. All findings tracked."
    depends_on_all_barriers: true
    labels: ["atom:verify"]
