name: obligation-test
description: >
  Per-obligation test derivation. Each obligation gets its own research →
  write → verify → commit chain with hard quality rules. Replaces batch
  skills (/surface, /remediate) with a formula that enforces deep context
  and 6 mechanical quality checks per test.

variables:
  OBLIGATION_IDS:
    description: "Space-separated obligation IDs to cover (e.g., UC-001-MAIN-01 UC-001-MAIN-02)"
    required: true

labels:
  - "mol:obligation-test"

setup:
  - id: baseline
    title: "Baseline quality snapshot"
    description: |
      Record the current quality state before any obligation tests are written.

      ## Instructions

      1. **Run quality gate and record pass count**:
         ```bash
         make quality 2>&1 | tail -20
         ```
         Record the total test count and pass count from pytest output.

      2. **Record current allowlist size**:
         ```bash
         python3 -c "import json; al=json.loads(open('tests/unit/obligation_coverage_allowlist.json').read()); print(f'Allowlist: {len(al)} obligations')"
         ```

      3. **Record current coverage**:
         ```bash
         python3 -c "
         import json, re
         from pathlib import Path
         al = json.loads(open('tests/unit/obligation_coverage_allowlist.json').read())
         # Count Covers: tags in known files
         covered = set()
         for f in Path('tests').rglob('*.py'):
             for line in f.read_text().splitlines():
                 m = re.match(r'\s+Covers:\s+([\w-]+)', line)
                 if m: covered.add(m.group(1))
         print(f'Covered: {len(covered)}')
         print(f'Allowlisted: {len(al)}')
         "
         ```

      4. **Store baseline**:
         ```bash
         bd update {EPIC_ID} --append-notes "## Baseline
         - make quality: PASS
         - Test count: N
         - Allowlist: N obligations
         - Covered: N obligations"
         ```

    acceptance: "make quality passes. Baseline counts recorded in epic notes."
    labels: ["atom:baseline"]

iterate:
  over: "OBLIGATION_IDS"
  item_var: "OID"
  all_var: "ALL_OIDS"
  count_var: "N"
  barrier_label: "atom:commit"
  atoms:
    # ── Atom 1: Research ──────────────────────────────────────────────
    - id: "research-{OID}"
      title: "Research obligation {OID}"
      description: |
        Deeply understand the obligation before writing any test code.
        You MUST produce three mandatory sections before closing this atom.

        ## Section 1: Obligation Understanding

        Find and read the exact scenario block for {OID}:
        ```bash
        grep -n "{OID}" docs/test-obligations/*.md
        ```

        Read the file at the matching line. Extract:
        - **Given/When/Then**: The exact scenario steps
        - **Business rule**: What behavior is being tested
        - **Priority**: P0/P1/P2/P3
        - **Layer**: Must be "behavioral" (skip if not)

        ## Section 2: Production Code Location

        Find the `_impl` function that implements this behavior:
        ```bash
        # Identify the use case from the OID prefix
        # UC-001 → discover/get products, UC-002 → create media buy, etc.
        # Search for the _impl function
        grep -rn "_impl" src/core/main.py | grep -i "<use-case-keyword>"
        ```

        Read the `_impl` function. Find the SPECIFIC LINES that implement
        the Given/When/Then from Section 1. You must be able to point to
        actual code, not just name a function.

        **If you cannot find production code**: This may be an unimplemented
        obligation. Note this — the test should be `@pytest.mark.xfail`.

        ## Section 3: Test Strategy

        Based on Sections 1 and 2, decide:

        1. **Unit or integration?**
           - Unit: if behavior is in `_impl` logic, validation, or schema
           - Integration: if behavior requires real DB state or multi-step flows
           - Default to unit unless DB interaction is the tested behavior

        2. **What mocks are needed?**
           - List each mock and WHY it's needed
           - If you need more than 3 mocks, reconsider — maybe integration is better

        3. **What is the KEY ASSERTION?**
           Answer: "What assertion would FAIL if the production behavior changed?"
           - BAD: `assert mock_db.called` (tests mock wiring, not behavior)
           - BAD: `assert result is not None` (tests existence, not correctness)
           - GOOD: `assert result.status == "pending_approval"` (tests business rule)
           - GOOD: `assert error.code == "INVALID_BUDGET"` (tests validation)

        4. **Which test file?**
           - Check existing files in `_UNIT_ENTITY_FILES` (test_architecture_obligation_coverage.py:31-39)
           - Prefer existing behavioral test files (e.g., test_create_media_buy_behavioral.py for UC-002)
           - If no suitable file exists, name the new file: `test_<use_case>_behavioral.py`

        ## Store Research

        ```bash
        bd update research-{OID} --notes "## Obligation: {OID}

        ### Understanding
        - Scenario: <title>
        - Given: <condition>
        - When: <action>
        - Then: <expected outcome>
        - Priority: <P0-P3>

        ### Production Code
        - File: <path>:<line>
        - Function: <name>
        - Key lines: <what the code does for this scenario>

        ### Test Strategy
        - Type: unit|integration
        - File: <test file path>
        - Mocks: <list or 'none'>
        - Key assertion: <the assertion that proves behavior>
        - Notes: <anything else>"
        ```

      acceptance: "All three sections (Understanding, Production Code, Test Strategy) present in notes. Key assertion identified."
      depends_on: ["baseline"]
      labels: ["atom:research", "atom:gate"]

    # ── Atom 2: Write Test ────────────────────────────────────────────
    - id: "write-test-{OID}"
      title: "Write obligation test for {OID}"
      description: |
        Write ONE test for obligation {OID}. Six hard rules — violating
        any one FAILS this atom.

        ## Prerequisites

        Read the research from the previous atom's notes:
        ```bash
        bd show research-{OID}
        ```

        ## Hard Rules

        | # | Rule | Check |
        |---|------|-------|
        | 1 | MUST import from `src.` | Test file has `from src.` import |
        | 2 | MUST call production function | Test body calls an `_impl` function, repository method, or schema method |
        | 3 | MUST assert production output | Assertion checks a value from the production call, not a mock attribute |
        | 4 | MUST have `Covers: {OID}` tag | Docstring or comment contains exactly `Covers: {OID}` |
        | 5 | MUST use factories where applicable | Use `tests/factories/` for model construction, not inline `Model(field=val)` |
        | 6 | MUST NOT be mock-echo only | Test does more than verify `mock.called` or `mock.assert_called_with` |

        ## Instructions

        1. **Read the research notes** for file location, strategy, and key assertion.

        2. **Write the test** following the research plan:
           - Place in the file identified in the research
           - Use the key assertion from the research
           - Follow existing patterns in the target file
           - Include the `Covers: {OID}` tag in the docstring

        3. **Test docstring format**:
           ```python
           def test_<descriptive_name>(self):
               """<What the test verifies>.

               Covers: {OID}
               """
           ```
           OR for async:
           ```python
           async def test_<descriptive_name>(self):
               """<What the test verifies>.

               Covers: {OID}
               """
           ```

        4. **Self-Check** — before closing, re-read your test and answer:
           - [ ] Does it import from `src.`? (Rule 1)
           - [ ] Does it call a production function? (Rule 2)
           - [ ] Does it assert something from the production output? (Rule 3)
           - [ ] Does it have `Covers: {OID}`? (Rule 4)

           If ANY answer is "no", rewrite the test.

        5. **If the test must be xfail** (production code doesn't implement the
           behavior yet):
           ```python
           @pytest.mark.xfail(reason="<what's missing in production code>")
           def test_<name>(self):
               """..."""
           ```
           The xfail test STILL must follow all 6 rules. It just won't pass yet.

        6. **Run the test**:
           ```bash
           uv run pytest <test_file>::<test_name> -x -v
           ```
           - PASS or XFAIL = good, proceed
           - FAIL with AssertionError = acceptable if testing unimplemented behavior (add xfail)
           - ERROR (ImportError, NameError, etc.) = test bug, fix it

      acceptance: "One test written following all 6 hard rules. Test runs without ERROR. Covers: {OID} tag present."
      depends_on: ["research-{OID}"]
      depends_on_prev_barrier: true
      labels: ["atom:write-test"]

    # ── Atom 3: Verify ────────────────────────────────────────────────
    - id: "verify-{OID}"
      title: "Verify obligation test for {OID}"
      description: |
        Six mechanical checks. No judgment calls — each check is pass/fail.

        ## Check 1: Production Import

        ```bash
        # Find which file has the test
        TEST_FILE=$(grep -rl "Covers: {OID}" tests/)
        echo "Test file: $TEST_FILE"
        grep "from src\." "$TEST_FILE" | head -5
        ```
        **FAIL if**: no `from src.` import in the test file.

        ## Check 2: Covers Tag Present and Unique

        ```bash
        # Exactly one match for this OID
        COUNT=$(grep -r "Covers: {OID}" tests/ | wc -l | tr -d ' ')
        echo "Covers: {OID} appears $COUNT time(s)"
        ```
        **FAIL if**: COUNT != 1.

        ## Check 3: Test Runs Without ERROR

        ```bash
        TEST_FILE=$(grep -rl "Covers: {OID}" tests/)
        # Extract the test function name
        TEST_FUNC=$(grep -B5 "Covers: {OID}" "$TEST_FILE" | grep "def test_" | sed 's/.*def \(test_[a-zA-Z0-9_]*\).*/\1/' | tail -1)
        uv run pytest "$TEST_FILE::$TEST_FUNC" -x -v 2>&1 | tail -20
        ```
        **PASS if**: exit code 0 (PASSED) or test is xfail.
        **FAIL if**: ERROR (not FAIL — a FAIL from assertion is OK for xfail tests).

        ## Check 4: make quality

        ```bash
        make quality 2>&1 | tail -30
        ```
        **FAIL if**: non-zero exit code.

        ## Check 5: No Duplicate Covers Tags

        ```bash
        # Check all Covers: tags across all test files for duplicates
        grep -rh "Covers:" tests/ | sort | uniq -d
        ```
        **FAIL if**: any output (duplicates exist).

        ## Check 6: Allowlist Update + Guard

        If the test PASSES (not xfail):

        1. Remove {OID} from the allowlist:
           ```bash
           python3 -c "
           import json
           path = 'tests/unit/obligation_coverage_allowlist.json'
           al = json.loads(open(path).read())
           if '{OID}' in al:
               al.remove('{OID}')
               open(path, 'w').write(json.dumps(sorted(al), indent=2) + '\n')
               print('Removed {OID} from allowlist')
           else:
               print('{OID} not in allowlist (already removed?)')
           "
           ```

        2. Ensure the test file is in `_UNIT_ENTITY_FILES` (if it's a unit test):
           ```bash
           TEST_FILE=$(grep -rl "Covers: {OID}" tests/unit/ 2>/dev/null)
           if [ -n "$TEST_FILE" ]; then
             BASENAME=$(basename "$TEST_FILE")
             grep -q "$BASENAME" tests/unit/test_architecture_obligation_coverage.py || \
               echo "WARNING: $BASENAME not in _UNIT_ENTITY_FILES — add it!"
           fi
           ```
           If the warning fires, add the filename to the `_UNIT_ENTITY_FILES` list
           in `tests/unit/test_architecture_obligation_coverage.py`.

        3. Run the obligation guard:
           ```bash
           uv run pytest tests/unit/test_architecture_obligation_coverage.py -x -v 2>&1 | tail -30
           ```
           **FAIL if**: any guard test fails.

        If the test is xfail, skip the allowlist removal but still run checks 1-5.

      acceptance: "All 6 checks pass. Allowlist updated (if test passes). Obligation guard passes."
      depends_on: ["write-test-{OID}"]
      labels: ["atom:verify", "atom:gate"]

    # ── Atom 4: Commit ────────────────────────────────────────────────
    - id: "commit-{OID}"
      title: "Commit obligation test for {OID}"
      description: |
        Commit the test and any allowlist/guard changes for {OID}.

        ## Instructions

        1. Check what changed:
           ```bash
           git status
           git diff --stat
           ```

        2. Stage the test file and allowlist:
           ```bash
           TEST_FILE=$(grep -rl "Covers: {OID}" tests/)
           git add "$TEST_FILE"
           git add tests/unit/obligation_coverage_allowlist.json
           # If _UNIT_ENTITY_FILES was updated:
           git add tests/unit/test_architecture_obligation_coverage.py
           ```

        3. Commit:
           ```bash
           git commit -m "test: add obligation test for {OID}"
           ```

        4. Verify:
           ```bash
           git log -1 --oneline
           ```

      acceptance: "Git commit exists for {OID} obligation test."
      depends_on: ["verify-{OID}"]
      labels: ["atom:commit"]

finalize:
  - id: verify-no-regression
    title: "Verify no regressions across all {N} obligation tests"
    description: |
      Final verification after all {N} obligation test chains complete.

      ## Instructions

      1. **Run full quality gate**:
         ```bash
         make quality 2>&1 | tail -30
         ```
         Compare test count to baseline. Should be >= baseline + {N}.

      2. **Run obligation guard**:
         ```bash
         uv run pytest tests/unit/test_architecture_obligation_coverage.py -v
         ```

      3. **Check allowlist shrinkage**:
         ```bash
         python3 -c "
         import json
         al = json.loads(open('tests/unit/obligation_coverage_allowlist.json').read())
         print(f'Allowlist now: {len(al)} obligations')
         "
         ```
         Should be baseline - (number of passing tests written).

      4. **Record final state**:
         ```bash
         bd update {EPIC_ID} --append-notes "## Final State
         - make quality: PASS/FAIL
         - Test count: N (baseline was M)
         - Allowlist: N (was M)
         - New tests: N passed, M xfail"
         ```

    acceptance: "make quality passes. No regressions. Allowlist reduced. Final counts recorded."
    depends_on_all_barriers: true
    labels: ["atom:verify-regression"]

  - id: sync-and-verify
    title: "Sync beads after all {N} obligation tests"
    description: |
      Sync beads state and verify clean working tree.

      ## Instructions

      1. Sync beads:
         ```bash
         bd sync --from-main
         ```

      2. Check clean state:
         ```bash
         git status
         bd list --status=open
         ```

    acceptance: "bd sync complete. Working tree clean."
    depends_on: ["verify-no-regression"]
    labels: ["atom:verify"]
