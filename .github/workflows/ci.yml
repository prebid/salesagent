name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: {}

concurrency:
  # One run per PR head ref; a superseded push cancels the in-flight run.
  # push/dispatch events get per-sha groups so runs on main never cancel or
  # queue behind each other.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  UV_VERSION: "0.11.15"
  DATABASE_URL: postgresql://adcp_user:test_password@127.0.0.1:5432/adcp_test
  GEMINI_API_KEY: test_key_for_mocking
  GOOGLE_CLIENT_ID: test_client_id
  GOOGLE_CLIENT_SECRET: test_client_secret
  SUPER_ADMIN_EMAILS: test@example.com
  ADCP_TESTING: true
  ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Run static analysis (make quality-ci)
        run: make quality-ci

  # mypy also runs inside Quality Gate via `make quality-ci` (the unified local
  # target — removing it there would drift local from CI). The dedicated job is
  # kept as a separate required-check signal; jobs run in parallel, so the
  # overlap costs runner minutes, not wall-clock time.
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Run mypy
        run: make typecheck

  schema-contract:
    name: Schema Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/unit/test_adcp_contract.py
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/integration/test_mcp_contract_validation.py
          extra_args: -v --tb=short

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Run security audit
        run: ./scripts/security-audit.sh

  quickstart:
    name: Quickstart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Start services with docker compose
        run: docker compose up -d --wait --wait-timeout 120
      - name: Verify health endpoint
        run: curl -f http://localhost:8000/health
      - name: Cleanup
        if: always()
        run: docker compose down -v

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/smoke/
          tb: short
          extra_args: -v

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/unit/ tests/harness/
          with_coverage: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-coverage
          path: |
            .coverage
            coverage.xml
          include-hidden-files: true
          if-no-files-found: error

  integration-tests:
    name: Integration (${{ matrix.group }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # pull adcp-creative-agent from ghcr.io (publish runs on main via publish-creative-agent.yml)
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: creative
            marker: creative
          - group: product
            marker: product and not creative
          - group: media-buy
            marker: (media_buy or delivery) and not creative and not product
          - group: infra
            marker: (transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent) and not creative and not product and not media_buy and not delivery
          - group: other
            marker: not (creative or product or media_buy or delivery or transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
      - name: Log in to GitHub Container Registry
        if: matrix.group == 'creative'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Start pinned creative agent
        if: matrix.group == 'creative'
        env:
          CREATIVE_AGENT_GHCR_IMAGE: ghcr.io/${{ github.repository }}/adcp-creative-agent
        run: ./scripts/creative-agent-stack.sh up
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/integration/
          disable_randomly: "true"
          extra_args: --timeout=60 -m "(${{ matrix.marker }}) and not requires_server and not skip_ci"
        env:
          CREATIVE_AGENT_URL: ${{ matrix.group == 'creative' && 'http://localhost:9999/api/creative-agent' || '' }}
      - name: Cleanup pinned creative agent
        if: always() && matrix.group == 'creative'
        run: ./scripts/creative-agent-stack.sh down

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Ensure docker-compose alias exists
        run: |
          docker compose version
          echo '#!/bin/bash' | sudo tee /usr/local/bin/docker-compose
          echo 'exec docker compose "$@"' | sudo tee -a /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
      - name: Clean up lingering containers
        run: |
          docker ps -q | xargs -r docker kill || true
          docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true
          docker compose down -v 2>/dev/null || true
          docker container prune -f 2>/dev/null || true
          docker network prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
      # No coverage: the server under test runs inside Docker, so host-side
      # coverage would measure the client harness, not src/.
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/e2e/
          extra_args: --timeout=300
        env:
          # Override workflow env — conftest starts docker-compose.e2e.yml (legacy test.yml parity).
          ADCP_TESTING: ""
          DATABASE_URL: ""
          ADCP_SALES_PORT: 8080
          POSTGRES_PORT: 5435
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
      - name: Cleanup Docker services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true

  admin-ui-tests:
    name: Admin UI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
      # The Coverage gate combines unit + BDD only; add an artifact upload
      # before re-enabling coverage here, or the data is silently dropped.
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/admin/
          extra_args: -m "not requires_server and not slow"

  bdd-tests-shard:
    name: BDD Tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
      - name: Resolve BDD shard paths
        id: bdd_shard
        run: |
          set -euo pipefail
          shard_list=$(mktemp)
          trap 'rm -f "$shard_list"' EXIT
          uv run python scripts/ci/shard_paths.py bdd ${{ matrix.shard }} > "$shard_list"
          mapfile -t TEST_FILES < "$shard_list"
          if [ "${#TEST_FILES[@]}" -eq 0 ]; then
            echo "::error::shard_paths.py produced no files for bdd shard ${{ matrix.shard }}"
            exit 1
          fi
          joined="${TEST_FILES[*]}"
          echo "paths=${joined}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/_pytest
        env:
          # Separate data file per shard so artifacts cannot collide with unit's .coverage.
          COVERAGE_FILE: .coverage.bdd-${{ matrix.shard }}
        with:
          paths: ${{ steps.bdd_shard.outputs.paths }}
          coverage_xml: coverage-bdd-${{ matrix.shard }}.xml
          extra_args: -n auto --dist=loadfile --timeout=60
      - name: Combine xdist coverage fragments
        run: |
          shopt -s nullglob
          fragments=(.coverage.bdd-${{ matrix.shard }}.*)
          if [ "${#fragments[@]}" -gt 0 ]; then
            uv run coverage combine --data-file=.coverage.bdd-${{ matrix.shard }} \
              .coverage.bdd-${{ matrix.shard }} "${fragments[@]}"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: bdd-shard-${{ matrix.shard }}-coverage
          path: |
            .coverage.bdd-${{ matrix.shard }}
            coverage-bdd-${{ matrix.shard }}.xml
          include-hidden-files: true
          if-no-files-found: error

  bdd-tests:
    name: BDD Tests
    runs-on: ubuntu-latest
    needs: [bdd-tests-shard]
    if: always()
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Aggregate BDD shards
        run: |
          if [ "${{ needs.bdd-tests-shard.result }}" != "success" ]; then
            echo "One or more BDD shards failed."
            exit 1
          fi
          echo "BDD shards passed."

  migration-roundtrip:
    name: Migration Roundtrip
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
          run-migrations: "false"
      - name: Migration roundtrip
        run: uv run python scripts/ci/migration_roundtrip.py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, bdd-tests-shard]
    if: ${{ needs.unit-tests.result == 'success' && needs.bdd-tests-shard.result == 'success' }}
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: unit-coverage
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: bdd-shard-*-coverage
          merge-multiple: true
          path: bdd-coverage-shards
      - name: Coverage gate
        run: |
          set -euo pipefail
          expected_bdd_shards="$(uv run python -c "from scripts.ci.shard_split import SHARD_COUNTS; print(SHARD_COUNTS['bdd'])")"
          bdd_data_files=()
          for shard in $(seq 1 "${expected_bdd_shards}"); do
            found="$(find bdd-coverage-shards -name ".coverage.bdd-${shard}" -type f | head -1)"
            if [ -z "${found}" ]; then
              echo "::error::Missing BDD coverage artifact for shard ${shard} (.coverage.bdd-${shard})"
              exit 1
            fi
            bdd_data_files+=("${found}")
          done
          if [ "${#bdd_data_files[@]}" -ne "${expected_bdd_shards}" ]; then
            echo "::error::Expected ${expected_bdd_shards} BDD coverage files, found ${#bdd_data_files[@]}"
            exit 1
          fi
          if [ ! -f .coverage ]; then
            echo "Unit coverage data file missing."
            exit 1
          fi
          uv run coverage combine --data-file=.coverage.combined .coverage "${bdd_data_files[@]}"
          ./scripts/ci/coverage_report.sh --data-file .coverage.combined

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
    timeout-minutes: 5
    needs:
      [
        quality-gate,
        type-check,
        schema-contract,
        security-audit,
        quickstart,
        smoke-tests,
        unit-tests,
        integration-tests,
        e2e-tests,
        admin-ui-tests,
        bdd-tests,
        migration-roundtrip,
        coverage,
      ]
    steps:
      - name: Validate job results
        run: |
          if [ "${{ needs.quality-gate.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.schema-contract.result }}" != "success" ] || \
             [ "${{ needs.security-audit.result }}" != "success" ] || \
             [ "${{ needs.quickstart.result }}" != "success" ] || \
             [ "${{ needs.smoke-tests.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.admin-ui-tests.result }}" != "success" ] || \
             [ "${{ needs.bdd-tests.result }}" != "success" ] || \
             [ "${{ needs.migration-roundtrip.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required CI checks passed."
