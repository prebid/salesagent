name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: {}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.15"
  DATABASE_URL: postgresql://adcp_user:test_password@127.0.0.1:5432/adcp_test
  GEMINI_API_KEY: test_key_for_mocking
  GOOGLE_CLIENT_ID: test_client_id
  GOOGLE_CLIENT_SECRET: test_client_secret
  SUPER_ADMIN_EMAILS: test@example.com
  ADCP_TESTING: true
  PYTEST_CURRENT_TEST: true
  ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - name: Run pre-commit
        run: make quality-ci

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - name: Run mypy
        run: uv run python -m mypy src --config-file=mypy.ini

  schema-contract:
    name: Schema Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/unit/test_adcp_contract.py

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - name: Run security audit
        run: ./scripts/security-audit.sh

  quickstart:
    name: Quickstart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Start services with docker compose
        run: docker compose up -d --wait --wait-timeout 120
      - name: Verify health endpoint
        run: curl -f http://localhost:8000/health
      - name: Cleanup
        if: always()
        run: docker compose down -v

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/smoke/
          tb: short
          extra_args: -v
      - name: Check for skipped tests
        run: |
          if grep -r "@pytest.mark.skip" tests/ --include="test_*.py" | grep -v "skip_ci"; then
            echo "Found skip decorators in tests!"
            exit 1
          fi
          echo "No skip decorators found"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/unit/ tests/harness/
          with_coverage: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-coverage
          path: |
            .coverage
            coverage.xml
          include-hidden-files: true
          if-no-files-found: error

  integration-tests:
    name: Integration (${{ matrix.group }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: creative
            marker: creative
          - group: product
            marker: product and not creative
          - group: media-buy
            marker: (media_buy or delivery) and not creative and not product
          - group: infra
            marker: (transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent) and not creative and not product and not media_buy and not delivery
          - group: other
            marker: not (creative or product or media_buy or delivery or transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
      - name: Start pinned creative agent
        if: matrix.group == 'creative'
        run: ./scripts/creative-agent-stack.sh up
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/integration/
          disable_randomly: "true"
          extra_args: --timeout=60 -m "(${{ matrix.marker }}) and not requires_server and not skip_ci"
        env:
          CREATIVE_AGENT_URL: ${{ matrix.group == 'creative' && 'http://localhost:9999/api/creative-agent' || '' }}
      - name: Cleanup pinned creative agent
        if: always() && matrix.group == 'creative'
        run: ./scripts/creative-agent-stack.sh down

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - name: Ensure docker-compose alias exists
        run: |
          docker compose version
          echo '#!/bin/bash' | sudo tee /usr/local/bin/docker-compose
          echo 'exec docker compose "$@"' | sudo tee -a /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
      - name: Clean up lingering containers
        run: |
          docker ps -q | xargs -r docker kill || true
          docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true
          docker compose down -v 2>/dev/null || true
          docker container prune -f 2>/dev/null || true
          docker network prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/e2e/
          with_coverage: "true"
          extra_args: --timeout=300
        env:
          # Override workflow env — conftest starts docker-compose.e2e.yml (legacy test.yml parity).
          ADCP_TESTING: ""
          DATABASE_URL: ""
          ADCP_SALES_PORT: 8080
          POSTGRES_PORT: 5435
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
      - name: Cleanup Docker services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true

  admin-ui-tests:
    name: Admin UI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/admin/
          with_coverage: "true"
          extra_args: -m "not requires_server and not slow"

  bdd-tests:
    name: BDD Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
      - uses: ./.github/actions/_pytest
        with:
          paths: tests/bdd/
          with_coverage: "true"
          extra_args: -n auto --dist=loadfile --timeout=60

  migration-roundtrip:
    name: Migration Roundtrip
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: ./.github/actions/_postgres
        with:
          database-url: ${{ env.DATABASE_URL }}
          run-migrations: "false"
      - name: Migration roundtrip
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade -1
          uv run alembic upgrade head

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/_setup-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: unit-coverage
      - name: Coverage gate
        run: |
          fail_under="$(tr -d '[:space:]' < .coverage-baseline)"
          uv run coverage report --fail-under="${fail_under}"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        quality-gate,
        type-check,
        schema-contract,
        security-audit,
        quickstart,
        smoke-tests,
        unit-tests,
        integration-tests,
        e2e-tests,
        admin-ui-tests,
        bdd-tests,
        migration-roundtrip,
        coverage,
      ]
    steps:
      - name: Validate job results
        run: |
          if [ "${{ needs.quality-gate.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.schema-contract.result }}" != "success" ] || \
             [ "${{ needs.security-audit.result }}" != "success" ] || \
             [ "${{ needs.quickstart.result }}" != "success" ] || \
             [ "${{ needs.smoke-tests.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.admin-ui-tests.result }}" != "success" ] || \
             [ "${{ needs.bdd-tests.result }}" != "success" ] || \
             [ "${{ needs.migration-roundtrip.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required CI checks passed."
