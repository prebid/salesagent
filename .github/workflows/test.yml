name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main , develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.11.6'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Scan for vulnerabilities
      # Ignored-vulnerabilities list + uv-secure invocation are single-sourced
      # in scripts/security-audit.sh (the same script is called by
      # ./run_all_tests.sh), so CI and local cannot drift. Bump the list there.
      run: ./scripts/security-audit.sh

  smoke-tests:
    name: Smoke Tests (Fast Import Checks)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run smoke tests
      env:
        GEMINI_API_KEY: test_key
        PYTEST_CURRENT_TEST: true
        ADCP_TESTING: true
      run: uv run pytest tests/smoke/ -v --tb=short

    - name: Check for skipped tests
      run: |
        if grep -r "@pytest.mark.skip" tests/ --include="test_*.py" | grep -v "skip_ci"; then
          echo "❌ Found skip decorators in tests!"
          exit 1
        fi
        echo "✅ No skip decorators found"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run unit tests
      env:
        GEMINI_API_KEY: test_key_for_mocking
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        ADCP_TESTING: true
      run: uv run pytest tests/unit/ -v --tb=short --cov=. --cov-report=term-missing

  integration-tests:
    name: Integration (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: creative
            marker: creative
          - group: product
            marker: product
          - group: media-buy
            marker: media_buy or delivery
          - group: infra
            marker: transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent
          - group: other
            marker: not (creative or product or media_buy or delivery or transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent)

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: |
        uv sync --extra dev
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name '*.pyc' -delete || true

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
      run: uv run python scripts/ops/migrate.py

    - name: Start reference creative agent
      if: matrix.group == 'creative'
      # Single source of truth for the pinned reference agent (commit pin +
      # build + run + healthwait) is scripts/creative-agent-stack.sh, so CI
      # and the local authoritative run (run_all_tests.sh) cannot drift
      # (salesagent-kczg). Bump the pin only in that script.
      run: ./scripts/creative-agent-stack.sh up

    - name: Run integration tests (${{ matrix.group }})
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
        GEMINI_API_KEY: test_key_for_mocking
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        ENCRYPTION_KEY: PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=
        ADCP_TESTING: true
        CREATIVE_AGENT_URL: ${{ matrix.group == 'creative' && 'http://localhost:9999/api/creative-agent' || '' }}
      run: |
        uv run pytest tests/integration/ -v --tb=short --timeout=60 \
          -m "(${{ matrix.marker }}) and not requires_server and not skip_ci"

  bdd-tests:
    name: BDD Tests
    runs-on: ubuntu-latest
    # 4265 BDD tests run sequentially; previous 15-minute limit was tight (one
    # canceled run hit 15m17s at ~95% complete) so the suite needs headroom.
    timeout-minutes: 25
    # BDD scenarios (tests/bdd/) use the integration_db fixture (Flask
    # test_client + real PostgreSQL) — same infra model as integration-tests,
    # NOT the full docker-compose stack. This job mirrors integration-tests.
    # Before this job existed, ./run_all_tests.sh ran BDD but CI did not,
    # so a broken BDD suite could land on main with CI green (see #1233 D1).

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: |
        uv sync --extra dev
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name '*.pyc' -delete || true

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
      run: uv run python scripts/ops/migrate.py

    - name: Run BDD tests
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
        GEMINI_API_KEY: test_key_for_mocking
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        ENCRYPTION_KEY: PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=
        ADCP_TESTING: true
      # No marker exclusions — mirror tox [testenv:bdd] exactly so CI and
      # local `tox -e bdd` / `./run_all_tests.sh` stay in parity. ``-v`` is
      # dropped: per-test PASSED lines for 4265 tests dominate the CI log and
      # writing them measurably slows the job; ``--tb=short`` still preserves
      # failure context.
      run: |
        uv run pytest tests/bdd/ --tb=short --timeout=60

  quickstart-test:
    name: Quickstart Docker Compose Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Test the actual quickstart flow users follow

    steps:
    - uses: actions/checkout@v4

    - name: Start services with docker compose
      run: |
        docker compose up -d --wait --wait-timeout 120
        echo "Services started, checking logs..."

    - name: Check db-init completed successfully
      run: |
        # Verify migrations ran
        docker compose logs db-init | grep -E "(migrations completed|Migration complete)" || {
          echo "❌ Migrations did not complete successfully"
          docker compose logs db-init
          exit 1
        }
        echo "✅ Database migrations completed"

    - name: Verify all services are healthy
      run: |
        # Check health endpoints
        curl -f http://localhost:8000/health || {
          echo "❌ Health check failed"
          docker compose logs
          exit 1
        }
        echo "✅ Services are healthy"

    - name: Verify database tables exist
      run: |
        # Connect to postgres and check tables
        docker compose exec -T postgres psql -U adcp_user -d adcp -c "\dt" | grep -E "media_buys|tenants|products" || {
          echo "❌ Required tables not found"
          docker compose exec -T postgres psql -U adcp_user -d adcp -c "\dt"
          exit 1
        }
        echo "✅ Database tables created successfully"

    - name: Cleanup
      if: always()
      run: docker compose down -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run E2E tests on PRs and main branch pushes - catch issues early!
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Verify Docker Compose v2
      run: |
        # GitHub-hosted runners include Docker Compose v2 plugin
        docker compose version
        # Create alias for backwards compatibility with tests that use docker-compose
        echo '#!/bin/bash' | sudo tee /usr/local/bin/docker-compose
        echo 'exec docker compose "$@"' | sudo tee -a /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Clean up any lingering containers
      run: |
        # Kill all running containers to prevent port conflicts
        docker ps -q | xargs -r docker kill || true
        # Clean up E2E compose stack specifically
        docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true
        docker compose down -v 2>/dev/null || true
        # Remove all containers, networks, and volumes
        docker container prune -f 2>/dev/null || true
        docker network prune -f 2>/dev/null || true
        docker volume prune -f 2>/dev/null || true

    - name: Run E2E tests
      env:
        # Docker Compose manages its own PostgreSQL - don't set DATABASE_URL
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test_key_for_mocking' }}
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        # Don't set ADCP_TESTING=true - let E2E tests manage their own Docker stack
        ADCP_SALES_PORT: 8080
        POSTGRES_PORT: 5435
        # Enable Docker BuildKit for faster builds with caching
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: |
        # Let pytest manage Docker Compose via conftest.py
        # Timeout is 300s (5 min) to allow for Docker build + startup + health checks + test execution
        uv run pytest tests/e2e/ -v --tb=short --timeout=300

    - name: Cleanup Docker services
      if: always()
      run: |
        docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true

  storyboard-compliance:
    name: AdCP Storyboard Compliance (${{ matrix.scenario.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # ADVISORY (non-blocking) until pre-existing salesagent gaps are addressed.
    # The first real run revealed these scenarios are blocked by:
    #   - #1247 gap #1: get_products rejects `adcp_major_version` parameter
    #     (affects all 3 scenarios via the discover phase)
    #   - Auth token mismatch: scenario passes --auth test123; salesagent's
    #     default tenant rejects it
    #   - inventory_list_* scenarios additionally need PR #1276 (persist+echo)
    # `continue-on-error: true` keeps the runner output visible (artifacts +
    # GitHub UI advisory warning) without blocking PR merge. Flip back to
    # false once the underlying gaps land.
    #
    # Runs the @adcp/sdk storyboard runner against a docker-compose tenant on every
    # PR. Each scenario in the matrix runs as a separate parallel job so failures
    # are isolated and artifacts are uploaded per-scenario. Adding a new scenario:
    # append an entry to strategy.matrix.scenario.
    #
    # Scenarios are activated by salesagent's get_adcp_capabilities specialism
    # declaration (currently `sales-non-guaranteed`). All three scenarios below
    # are bundled in that specialism's requires_scenarios.
    #
    # See:
    # - .claude/notes/buying-mode-refine-wireup/PLAN.md §4.4 (refine_products)
    # - .claude/notes/inventory-targeting/PLAN.md A3+A4 (inventory_list_*)
    # - Issue #1247 item 5 (storyboard CI), gap #1 (adcp_major_version)
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - id: media_buy_seller/refine_products
            name: refine_products
            artifact: refine-products
          - id: media_buy_seller/inventory_list_targeting
            name: inventory_list_targeting
            artifact: inventory-list-targeting
          - id: media_buy_seller/inventory_list_no_match
            name: inventory_list_no_match
            artifact: inventory-list-no-match

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        # Node 22+: @adcp/sdk's auth.js requires the ESM-only `jose` package
        # which Node 20's CommonJS require() rejects with ERR_REQUIRE_ESM.
        node-version: '22'

    - name: Start salesagent stack with docker compose
      run: |
        docker compose up -d --wait --wait-timeout 180

    - name: Verify health
      run: |
        for i in $(seq 1 30); do
          if curl -fs http://localhost:8000/health > /dev/null; then
            echo "salesagent healthy"
            break
          fi
          sleep 2
        done
        curl -fs http://localhost:8000/health || {
          echo "salesagent failed to come up"
          docker compose logs --tail=50
          exit 1
        }

    - name: Smoke-test @adcp/sdk storyboard CLI
      # Fail-fast on CLI-shape breakage (wrong flag, missing arg, ESM error).
      # Without this, a CLI regression would only surface as a confusing
      # error inside the live storyboard run — and historically was swallowed
      # by `|| true`. See PLAN-v2 A3.
      run: |
        node --version
        npx -y @adcp/sdk@6.11.0 storyboard list | head -5

    - name: Run ${{ matrix.scenario.name }} storyboard via @adcp/sdk
      env:
        ADCP_AUTH_TOKEN: test123
        SCENARIO_ID: ${{ matrix.scenario.id }}
        SCENARIO_NAME: ${{ matrix.scenario.name }}
      run: |
        # CLI grammar (verified against @adcp/sdk@6.11.0 bin/adcp.js):
        #   adcp storyboard run <agent_url> <storyboard_id> [--protocol mcp]
        # Captures the runner's exit code explicitly via set +e / set -e and
        # surfaces real failure on any non-zero exit. `--summary-output`
        # writes a schema-stable summary artifact for debugging.
        # --allow-http: runner's pre-flight refuses non-HTTPS URLs by default
        # ("Production agents MUST terminate TLS"). CI runs against the local
        # docker stack at http://localhost:8000/mcp/, so this is required.
        set +e
        npx -y @adcp/sdk@6.11.0 storyboard run \
          http://localhost:8000/mcp/ \
          "$SCENARIO_ID" \
          --protocol mcp \
          --allow-http \
          --auth "$ADCP_AUTH_TOKEN" \
          --json --summary-output storyboard-summary.json \
          > storyboard-result.json
        RC=$?
        set -e
        cat storyboard-result.json | jq '.' || echo "(storyboard-result.json was empty or non-JSON)"
        cat storyboard-summary.json | jq '.' || echo "(storyboard-summary.json missing or non-JSON)"
        if [ "$RC" -ne 0 ]; then
          echo "::error::Storyboard $SCENARIO_NAME failed (runner exit $RC)"
          exit "$RC"
        fi
        echo "✅ Storyboard $SCENARIO_NAME: runner exit 0"

    - name: Upload storyboard result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: storyboard-${{ matrix.scenario.artifact }}-${{ github.run_id }}
        path: |
          storyboard-result.json
          storyboard-summary.json
        retention-days: 7

    - name: Cleanup
      if: always()
      run: docker compose down -v

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Ruff linter
      run: uv run ruff check . --config pyproject.toml || true
      continue-on-error: true

    - name: Run Ruff formatter
      run: uv run ruff format . --check --config pyproject.toml || true
      continue-on-error: true

    - name: Run mypy type checking (ENFORCED - must pass)
      run: |
        echo "🔍 Running mypy type checks on src/ directory..."
        # Use uv to run mypy from the project's virtual environment
        uv run python -m mypy src/ --config-file=mypy.ini
        echo "✅ Mypy type checking passed (0 errors)"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [security-audit, smoke-tests, unit-tests, integration-tests, bdd-tests, quickstart-test, e2e-tests, storyboard-compliance, lint]
    if: always()

    steps:
    - name: Check test results
      run: |
        # storyboard-compliance is intentionally excluded from the failure-blocking
        # check while pre-existing salesagent gaps (#1247 gap #1, auth token,
        # PR #1276 persist+echo) keep the gates red. See storyboard-compliance
        # job comment for the flip-back path. The job still runs + uploads
        # artifacts + shows GitHub UI warnings — just non-blocking for merge.
        if [ "${{ needs.security-audit.result }}" = "failure" ] || [ "${{ needs.unit-tests.result }}" = "failure" ] || [ "${{ needs.integration-tests.result }}" = "failure" ] || [ "${{ needs.bdd-tests.result }}" = "failure" ] || [ "${{ needs.quickstart-test.result }}" = "failure" ] || [ "${{ needs.e2e-tests.result }}" = "failure" ] || [ "${{ needs.lint.result }}" = "failure" ]; then
          echo "❌ Tests failed"
          exit 1
        else
          if [ "${{ needs.storyboard-compliance.result }}" = "failure" ]; then
            echo "⚠️ Storyboard compliance has advisory failures — see job artifacts and #1247 gap #1"
          fi
          echo "✅ All required tests passed (security-audit, smoke, unit, integration x5, bdd, quickstart, e2e, lint+mypy)"
        fi
