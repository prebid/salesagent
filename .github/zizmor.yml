# zizmor allowlist — per ADR-003 and security.yml policy.
#
# POLICY: every allowlist entry MUST have:
#   1. The zizmor rule ID (from error[rule-id] in zizmor output)
#   2. The workflow base filename it applies to (NOT the full path)
#   3. A justification and owner
#
# Format: ignore entries use the workflow base filename (e.g. "foo.yml"),
# optionally with :line or :line:column for narrower suppression.
#
# To re-audit: uvx zizmor --min-severity medium --config .github/zizmor.yml .github/workflows/
# Entries that no longer appear in zizmor output should be removed.

rules:
  # ─────────────────────────────────────────────────────────────────────────────
  # dangerous-triggers — pull_request_target permitted ONLY for metadata-only
  # workflows that do NOT check out PR source code (ADR-003).
  # pr-title-check.yml: reads PR title metadata only — no checkout.
  # ipr-agreement.yml: verify uses pull_request (read-only); sign uses
  # issue_comment only — no pull_request_target (removed).
  # ─────────────────────────────────────────────────────────────────────────────
  dangerous-triggers:
    ignore:
      - pr-title-check.yml

  # ─────────────────────────────────────────────────────────────────────────────
  # archived-uses — ipr-agreement.yml uses contributor-assistant/github-action
  # from an archived repository. There is no maintained alternative for the
  # CLA/IPR assistant workflow at this time.
  # Risk accepted by @chrishuie; tracked for replacement in #1234-pr6.
  # ─────────────────────────────────────────────────────────────────────────────
  archived-uses:
    ignore:
      - ipr-agreement.yml

  # ─────────────────────────────────────────────────────────────────────────────
  # excessive-permissions:
  #
  # ipr-agreement.yml: ipr-sign job needs contents/pull-requests/statuses: write
  # for CLA-assistant to commit signatures (verify job is read-only).
  #
  # release-please.yml: job-level permissions only (workflow default is contents +
  # pull-requests). No workflow-level packages: write — excessive-permissions no
  # longer fires for this file (verified via zizmor --persona=auditor).
  #
  # pr-title-check.yml: no explicit permissions block — uses workflow default.
  # The amannn/action-semantic-pull-request action requires pull-requests: write
  # to post status checks. Narrowing tracked for #1234-pr3.
  # ─────────────────────────────────────────────────────────────────────────────
  excessive-permissions:
    ignore:
      - ipr-agreement.yml
      - pr-title-check.yml

  # ─────────────────────────────────────────────────────────────────────────────
  # unpinned-images — ci.yml postgres service containers use the unified rolling
  # tag postgres:17-alpine (PR 5 / ADR-008). Digest pin for service containers
  # is deferred; test_architecture_postgres_image_anchor enforces tag consistency.
  # gam-nightly.yml uses the same GHA postgres service pattern for gam_lifecycle_db.
  # ─────────────────────────────────────────────────────────────────────────────
  unpinned-images:
    ignore:
      - ci.yml
      - gam-nightly.yml

  # ─────────────────────────────────────────────────────────────────────────────
  # secrets-outside-env — release-please.yml publishes to Docker Hub via repo
  # secrets (DOCKERHUB_USER/PASSWORD). A dedicated GitHub Environment is deferred
  # until org-level environment protection is configured (post-#1234 admin).
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-outside-env:
    ignore:
      - release-please.yml
