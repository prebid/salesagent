# Hook revisions (rev:) are SHA-pinned, not tag-pinned.
#
# WHY SHA PINS: Git tags are mutable — a maintainer (or attacker who has
# compromised an upstream account) can move a tag to a different commit
# without changing the tag name. If we use rev: v6.0.0, a tag rewrite
# silently changes what code runs on every developer's machine and in CI.
# Commit SHAs are immutable: once a commit is published, its SHA never
# changes. This is a supply-chain security requirement (issue #1234, D1).
#
# HOW TO UPDATE: Run `pre-commit autoupdate --freeze` to advance all hooks
# to their latest versions while keeping the SHA-pinned format.
# Each frozen rev shows the tag it corresponds to as: # frozen: <tag>
#
# Per ADR-001: Python hooks use `language: system` or `entry: uv run ...`
# so they resolve dependencies from uv.lock, not from additional_dependencies.
# This prevents version drift between what CI runs and what pre-commit runs.

# D44: pre-push stage name requires pre-commit >= 3.2.0.
minimum_pre_commit_version: 3.2.0

# D31: auto-install pre-commit AND pre-push hooks on `pre-commit install`.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # Layer 1 — commit stage (fast; target <=12 hooks)
      - id: no-hardcoded-urls
        name: Check for hardcoded URLs in JavaScript
        entry: uv run python .pre-commit-hooks/check_hardcoded_urls.py
        language: system
        files: '^(templates/.*\.html|static/.*\.js)$'
        pass_filenames: true
        stages: [pre-push]

      - id: repo-invariants
        name: Repo invariants (no-skip-tests, no-fn-calls)
        entry: uv run python .pre-commit-hooks/check_repo_invariants.py
        language: system
        types: [python]
        pass_filenames: true

      # Layer 2 — pre-push stage (medium cost; CI is authoritative for heavy checks)
      - id: check-docs-links
        name: Check documentation links
        entry: uv run python .pre-commit-hooks/check_docs_links.py
        language: system
        files: '^(docs/.*\.md|[^/]+\.md)$'
        pass_filenames: false
        stages: [pre-push]

      - id: check-route-conflicts
        name: Detect Flask route conflicts
        entry: uv run python .pre-commit-hooks/check_route_conflicts.py
        language: system
        files: '^(src/.*\.py)$'
        pass_filenames: false
        stages: [pre-push]

      - id: type-ignore-no-regression
        name: "Check type: ignore count (no regression)"
        entry: uv run python .pre-commit-hooks/check_type_ignore_count.py
        language: system
        files: '^src/.*\.py$'
        pass_filenames: false
        stages: [pre-push]

      - id: adcp-contract-tests
        name: Verify AdCP protocol compliance
        entry: uv run pytest tests/unit/test_adcp_contract.py -v --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mcp-schema-alignment
        name: MCP tool-schema parameter alignment
        entry: uv run python scripts/hooks/validate_mcp_schemas.py
        language: system
        files: '^(src/core/schemas\.py|src/core/main\.py)$'
        pass_filenames: false
        stages: [pre-push]

      - id: check-tenant-context-order
        name: Check tenant context auth before get_current_tenant()
        entry: uv run python .pre-commit-hooks/check_tenant_context_order.py
        language: system
        files: '^src/core/tools/.*\.py$'
        pass_filenames: true
        stages: [pre-push]

      - id: ast-grep-bdd-guards
        name: ast-grep BDD step guards (scaffold — no rules yet)
        entry: ast-grep scan
        language: system
        files: '^tests/bdd/steps/.*\.py$'
        pass_filenames: false
        stages: [pre-push]

      - id: check-migration-completeness
        name: Check migration completeness (upgrade + downgrade)
        entry: uv run python .pre-commit-hooks/check_migration_completeness.py
        language: system
        files: '^alembic/versions/.*\.py$'
        pass_filenames: true
        stages: [pre-push]

      - id: smoke-tests
        name: Run smoke tests (critical paths)
        entry: uv run pytest tests/smoke/ -v --tb=short -m smoke
        language: system
        pass_filenames: false
        stages: [manual]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: check-ast
      - id: debug-statements

  # Per ADR-001: formatter runs via `uv run ruff format` from uv.lock — same
  # command as `make quality`. Replaces psf/black pre-commit repo (PR 2 #1234).
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
        exclude: ^alembic/versions/
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^alembic/versions/

  # Per ADR-001: mypy runs via `uv run` from uv.lock (PR 2 #1234).
  # Pre-push tier only; CI / Type Check + make quality-ci are authoritative.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        args: [--config-file=mypy.ini, src/]
        files: '^src/'
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce  # frozen: v8.30.0
    hooks:
      - id: gitleaks
