# Docker Compose for E2E tests
#
# Builds from source and exposes services via nginx proxy for production-like testing.
# Used by tests/e2e/conftest.py to run the full test suite.
#
# All services (MCP, A2A, Admin) run in a single FastAPI process behind nginx.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d
#
# Port configuration (via environment variables):
#   ADCP_SALES_PORT - Nginx proxy port (default: 8092, proxies to adcp-server:8080)
#   POSTGRES_PORT   - PostgreSQL port (default: 5435)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: adcp
      POSTGRES_USER: adcp_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp_user -d adcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  creative-agent-db:
    image: postgres:16
    environment:
      POSTGRES_DB: adcp_registry
      POSTGRES_USER: adcp
      POSTGRES_PASSWORD: localdev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  creative-agent:
    build:
      context: ../adcp
    ports:
      - "${CREATIVE_AGENT_PORT:-9999}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://adcp:localdev@creative-agent-db:5432/adcp_registry
      - RUN_MIGRATIONS=true
      - ALLOW_INSECURE_COOKIES=true
      - DEV_USER_EMAIL=ci@test.com
      - DEV_USER_ID=ci-user
      - AGENT_TOKEN_ENCRYPTION_SECRET=local-dev-encryption-key-32chars!
      - WORKOS_API_KEY=sk_test_dummy
      - WORKOS_CLIENT_ID=client_dummy
    depends_on:
      creative-agent-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:8080/api/creative-agent/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  adcp-server:
    build: .
    environment:
      DATABASE_URL: postgresql://adcp_user:secure_password_change_me@postgres:5432/adcp?sslmode=disable
      SKIP_NGINX: "true"
      SKIP_CRON: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ADCP_TESTING: ${ADCP_TESTING:-true}
      ADCP_AUTH_TEST_MODE: ${ADCP_AUTH_TEST_MODE:-true}
      CREATE_DEMO_TENANT: "true"
      DELIVERY_WEBHOOK_INTERVAL: ${DELIVERY_WEBHOOK_INTERVAL:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=}  # TEST ONLY — never use in production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SALES_AGENT_DOMAIN: "sales-agent.example.com"
      ADCP_MULTI_TENANT: "true"
      CREATIVE_AGENT_URL: "http://creative-agent:8080/api/creative-agent"
    depends_on:
      postgres:
        condition: service_healthy
      creative-agent:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./audit_logs:/app/audit_logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  proxy:
    image: nginx:stable
    volumes:
      - ./config/nginx/nginx-development.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - adcp-server
    ports:
      - "127.0.0.1:${ADCP_SALES_PORT:-8092}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
