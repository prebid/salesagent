# Docker Compose for E2E tests
#
# Builds from source and exposes services via nginx proxy for production-like testing.
# Used by tests/e2e/conftest.py to run the full test suite.
#
# All services (MCP, A2A, Admin) run in a single FastAPI process behind nginx.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d
#
# Port configuration (via environment variables):
#   ADCP_SALES_PORT - Nginx proxy port (default: 8092, proxies to adcp-server:8080)
#   POSTGRES_PORT   - PostgreSQL port (default: 5435)

services:
  postgres:
    image: postgres:17-alpine
    # Throwaway test DB: ~79% of BDD wall time is CREATE DATABASE + DDL + writes
    # (per-test isolated DBs). Putting PGDATA on tmpfs (RAM) makes template
    # copies and DDL RAM-fast — this is the actual speed win, not durability
    # flags (on tmpfs, fsync/synchronous_commit are moot: there is no disk to
    # flush). Data is recreated every run and never persisted. max_connections
    # is raised for many parallel xdist workers. tmpfs size via PGDATA_TMPFS_SIZE.
    command:
      - postgres
      - -c
      - max_connections=300
    environment:
      POSTGRES_DB: adcp
      POSTGRES_USER: adcp_user
      POSTGRES_PASSWORD: secure_password_change_me
    tmpfs:
      - /var/lib/postgresql/data:size=${PGDATA_TMPFS_SIZE:-10g}
    # NO host port here — publishing lives in docker-compose.e2e.ports.yml, which
    # only the HOST paths overlay (conftest standalone branch, test-stack.sh). The
    # in-network runner uses this base file alone and reaches Postgres by service
    # name (postgres:5432), so it publishes ZERO host ports and many stacks can
    # run concurrently without a port collision.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp_user -d adcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  adcp-server:
    build: .
    environment:
      DATABASE_URL: postgresql://adcp_user:secure_password_change_me@postgres:5432/adcp?sslmode=disable
      # Pin strict schema validation (extra="forbid") for the e2e_rest boundary so
      # the live server rejects spec-invalid input the same way the dev/test
      # transports do. is_production() defaults to "development" already, but make
      # it explicit so a future Dockerfile/env change can't silently flip the
      # boundary to production's lenient extra="ignore". (salesagent-hm9q)
      ENVIRONMENT: development
      SKIP_NGINX: "true"
      SKIP_CRON: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ADCP_TESTING: ${ADCP_TESTING:-true}
      ADCP_AUTH_TEST_MODE: ${ADCP_AUTH_TEST_MODE:-true}
      # The SERVER must know about the pinned in-network creative agent: sync/
      # create flows resolve format specs server-side, and references carry the
      # PUBLIC canonical agent_url — without this, the registry's connection
      # alias has nothing to route to and the server calls the LIVE public host,
      # which rate-limits under CI load (salesagent-9qe2). The runner service
      # already sets the same value for the direct integration tests.
      CREATIVE_AGENT_URL: http://creative-agent:8080/api/creative-agent
      CREATE_DEMO_TENANT: "true"
      DELIVERY_WEBHOOK_INTERVAL: ${DELIVERY_WEBHOOK_INTERVAL:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=}  # TEST ONLY — never use in production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SALES_AGENT_DOMAIN: "sales-agent.example.com"
      ADCP_MULTI_TENANT: "true"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # BLACKHOLE the live public creative agent: tests must NEVER depend on it
      # (its catalog drifts and it rate-limits under CI load — salesagent-9qe2,
      # salesagent-kczg). The registry aliases this host to the pinned in-network
      # agent; if any code path regresses and connects to it verbatim, this makes
      # it fail INSTANTLY (connection refused) instead of flaking on a 429.
      - "creative.adcontextprotocol.org:127.0.0.1"
    # Same Docker embedded-DNS concurrent-lookup race fix as the runner — the
    # server resolves postgres/creative-agent and the webhook callback host.
    dns_opt:
      - single-request-reopen
    volumes:
      - .:/app
    # Tighter probes + start_period so `compose up --wait` (CI #1667) survives
    # alembic + cold import without waiting a full 30s interval before first check.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 60s

  proxy:
    image: nginx:stable
    volumes:
      - ./config/nginx/nginx-development.conf:/etc/nginx/nginx.conf:ro
    # Wait for adcp healthy before starting nginx — otherwise /health → 502 while
    # adcp is still in its 60s start_period and `compose up --wait` can flake
    # (proxy budget ~50s < adcp start_period; CI #1667 / #1669).
    depends_on:
      adcp-server:
        condition: service_healthy
    # NO host port here either — see the postgres note above. Publishing for the
    # host paths is in docker-compose.e2e.ports.yml; the in-network runner reaches
    # the proxy by service name (proxy:8000).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # In-network test runner (Option 1). Reaches Postgres/the server by SERVICE
  # NAME on the compose network — postgres:5432, proxy:8000 — so it needs NO
  # published host ports. Each `docker compose -p <project>` gets its own
  # isolated network, so `postgres` here can never collide with another stack's
  # `postgres`. This removes the host-port TOCTOU race that scripts/test-stack.sh
  # hits when guessing free ports in 50000-60000 under a crowded Docker host.
  #
  # Gated behind a profile so a normal `up` does not start it; the runner is
  # launched explicitly via `docker compose run --rm tests ...`
  # (see run_all_tests.sh).
  tests:
    profiles: ["runner"]
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      # Fixed in-network DB address — never a host port, never collides. This is
      # the SUITE database used by unit(skip)/integration/bdd/admin.
      DATABASE_URL: postgresql://adcp_user:secure_password_change_me@postgres:5432/adcp_test?sslmode=disable
      # E2E and UI must hit the SERVER's database (/adcp), not the suite DB. The
      # tox e2e/ui envs override DATABASE_URL from this var (host path leaves it
      # unset and keeps its own DATABASE_URL).
      E2E_DATABASE_URL: postgresql://adcp_user:secure_password_change_me@postgres:5432/adcp?sslmode=disable
      # bdd 5th transport (E2E_REST): real HTTP through the proxy to the live
      # server, with Given-step factory data written to the SERVER's DB so the
      # server sees it. E2E_BASE_URL = the in-network proxy; E2E_POSTGRES_URL =
      # the server DB (/adcp). BDD_E2E_ENABLED=true adds the e2e_rest transport to
      # the bdd parametrization (was off everywhere — needs this Docker stack).
      BDD_E2E_ENABLED: "${BDD_E2E_ENABLED:-true}"
      E2E_BASE_URL: http://proxy:8000
      E2E_POSTGRES_URL: postgresql://adcp_user:secure_password_change_me@postgres:5432/adcp?sslmode=disable
      # Suites that hit the running server reach it in-network (no host port).
      ADCP_SERVER_URL: http://proxy:8000
      ADCP_SALES_PORT: "8000"
      # e2e/ui address the server by service name (proxy) and the server DB by
      # service name (postgres:5432) — resolved by conftest via these vars.
      ADCP_TEST_HOST: proxy
      ADCP_TEST_DB_HOST: postgres
      ADCP_TEST_DB_PORT: "5432"
      # Webhook reverse-addressing: the server calls back to this runner by its
      # network alias (requires `docker compose run --use-aliases`). 'tests' is
      # not 'localhost', so the server does NOT rewrite it to host.docker.internal.
      ADCP_WEBHOOK_HOST: tests
      # Pinned reference creative agent, reachable in-network by service name
      # (no host :9999). Clears the 18 test_creative_agent_live integration tests.
      CREATIVE_AGENT_URL: http://creative-agent:8080/api/creative-agent
      # Playwright chromium is pre-installed in Dockerfile.test at this path.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      # bdd runs truly serial in-network: -n0 (no xdist subprocess). Two reasons:
      # (1) all bdd workers share ONE live Postgres in e2e mode -> xdist races; and
      # (2) under xdist BDD_E2E_ENABLED doesn't reach the worker's collection, so
      # the e2e_rest 5th transport is silently dropped. -n0 collects in-process.
      BDD_XDIST_N: "${BDD_XDIST_N:-0}"
      # xdist distribution mode: loadfile (default; whole feature file -> one
      # worker) vs load (individual scenarios spread across workers). load
      # removes the big-file wall-time floor but requires scenarios to be
      # independent (no intra-file prerequisite coupling).
      BDD_DIST: "${BDD_DIST:-loadfile}"
      # Integration/unit xdist worker counts (0/unset = serial). Plumbed so the
      # box fast-profile (INTEGRATION_XDIST_N=auto) actually reaches pytest inside
      # the runner container. integration_db creates a uuid-named DB per test, so
      # parallel workers never share rows -> race-free. UNIT_XDIST_N stays 0 by
      # default (unit -n auto has flaked); exposed for parity.
      INTEGRATION_XDIST_N: "${INTEGRATION_XDIST_N:-0}"
      UNIT_XDIST_N: "${UNIT_XDIST_N:-0}"
      # Opt-in fast per-test DB path: clone from a schema template (default off).
      # TEST_DB_SKIP_DROP additionally skips the per-test DROP — safe ONLY on a
      # throwaway (tmpfs) Postgres, where clones are wiped on container restart;
      # off elsewhere so template mode never leaks DBs on a persistent Postgres.
      TEST_DB_TEMPLATE: "${TEST_DB_TEMPLATE:-}"
      TEST_DB_SKIP_DROP: "${TEST_DB_SKIP_DROP:-}"
      # bdd is the only suite using `pytest -n auto`. It MUST run serial in-network:
      # all bdd workers share ONE Postgres (postgres:5432/adcp_test), and the
      # factory-boy fixtures create tenants/principals with fixed IDs, so >1 worker
      # races on shared rows -> a large block of setup ERRORS (non-deterministic;
      # it happened to pass with 4 workers on the dev branch, then failed hard on a
      # clean main run). Pinning auto=1 serializes DB access -> deterministic green
      # (verified: 1451 passed / 5122 xfailed / 0 errors). Also keeps memory bounded
      # (the bare `-n auto` would otherwise spawn ~17 app-loading workers -> OOM).
      PYTEST_XDIST_AUTO_NUM_WORKERS: "${PYTEST_XDIST_AUTO_NUM_WORKERS:-1}"
      ADCP_TESTING: "true"
      ADCP_AUTH_TEST_MODE: "true"
      CREATE_SAMPLE_DATA: "true"
      DELIVERY_WEBHOOK_INTERVAL: "5"
      # The source is bind-mounted, so the host's in-tree __pycache__ comes with
      # it — and those .pyc embed host absolute paths in co_filename, which makes
      # pytest-bdd's scenarios() resolve feature files to /Users/... instead of
      # /app/... (FileNotFoundError). Redirect bytecode to a container-local dir
      # so Python recompiles from /app and paths resolve correctly.
      PYTHONPYCACHEPREFIX: /tmp/pycache
      GEMINI_API_KEY: ${GEMINI_API_KEY:-test_key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=}  # TEST ONLY — never use in production
    depends_on:
      postgres:
        condition: service_healthy
      creative-agent:
        condition: service_healthy
    extra_hosts:
      # BLACKHOLE the live public creative agent (see the adcp-server entry):
      # a runner-side leak fails instantly instead of flaking on a 429.
      - "creative.adcontextprotocol.org:127.0.0.1"
    # Fix the Docker embedded-DNS concurrent-lookup race (moby/moby#22142): under
    # the e2e suite's connection churn, glibc fires the A and AAAA queries in
    # parallel over one UDP socket to 127.0.0.11 and one response gets dropped,
    # so getaddrinfo('proxy') intermittently returns EAI_NONAME ("Name or service
    # not known") — the flaky tenant-isolation failures. single-request-reopen
    # makes glibc issue the two queries sequentially on separate sockets, removing
    # the race. (Host runs use localhost, so they never hit DNS at all.)
    dns_opt:
      - single-request-reopen
    volumes:
      - .:/app
      - tox_data:/app/.tox  # keep tox envs off the bind-mounted host tree
    working_dir: /app
    # venv lives at /opt/venv (UV_PROJECT_ENVIRONMENT in Dockerfile.test), outside
    # the /app bind mount, so it is never shadowed — no .venv anonymous volume.
    # Overridden by `docker compose run --rm tests <cmd>`; idle by default.
    command: ["sleep", "infinity"]

  # ─── Pinned reference creative agent (in-network) ──────────────────────────
  # Mirror of scripts/creative-agent-stack.sh, but ON the compose network with
  # NO published host port. The host path runs that script standalone (creative-net,
  # :9999); in-network we reuse the SAME pre-built image (`adcp-creative-agent`,
  # adcp@ADCP_PIN from that script) so CI/host/in-network cannot diverge on the pin. The
  # image is built by `scripts/creative-agent-stack.sh build` before `up`
  # (run_all_tests.sh for the in-network path; tests/e2e/conftest.py for the
  # host-side standalone path). NOT profile-gated: the SERVER resolves format
  # specs against this agent (CREATIVE_AGENT_URL) and the live public host is
  # blackholed, so every e2e `up` needs it (salesagent-9qe2).
  creative-pg:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: adcp_registry
      POSTGRES_USER: adcp
      POSTGRES_PASSWORD: localdev
    volumes:
      - creative_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp -d adcp_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  creative-agent:
    image: adcp-creative-agent  # built by scripts/creative-agent-stack.sh build
    environment:
      # NOT production: since adcp v3.1.1 the agent refuses to start with the
      # DEV_USER_* auth bypass (which the test harness needs) in a
      # production-shaped env (NODE_ENV=production). Mirrors
      # scripts/creative-agent-stack.sh cmd_up.
      NODE_ENV: development
      PORT: "8080"
      DATABASE_URL: postgresql://adcp:localdev@creative-pg:5432/adcp_registry
      RUN_MIGRATIONS: "true"
      ALLOW_INSECURE_COOKIES: "true"
      DEV_USER_EMAIL: ci@test.com
      DEV_USER_ID: ci-user
      AGENT_TOKEN_ENCRYPTION_SECRET: local-ci-encryption-key-32chars!!
      WORKOS_API_KEY: sk_test_dummy
      WORKOS_CLIENT_ID: client_dummy
    depends_on:
      creative-pg:
        condition: service_healthy
    # Node is guaranteed in this image; curl/wget may not be. Use node http.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/creative-agent/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  tox_data:
  creative_pg_data:
