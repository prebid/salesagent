# Sales Agent-owned scenario replacements for private/unavailable adcp-req input.
# compile_bdd.py applies these after merge and normal compilation; normal verify
# and --verify-local-overrides prove compiled artifacts retain the local contract.
schema_version: 1
# Protocol grounding (AdCP 3.1.1, authoritative repository paths):
# - UC-005 request filters, uniqueItems, and the media-buy role boundary:
#   dist/schemas/3.1.1/media-buy/list-creative-formats-request.json;
#   storyboard: ungraded (no 3.1.1 compliance scenario exercises these fields).
# - UC-005 response ordering: dist/schemas/3.1.1/media-buy/list-creative-formats-response.json;
#   storyboard: ungraded.
# - UC-019 revision and confirmed_at: dist/schemas/3.1.1/media-buy/get-media-buys-response.json;
#   storyboard: ungraded. The local scenarios grade the schema contract directly.
overrides:
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-ext-b-disclosure-dupes
    authority: "AdCP 3.1.1 list-creative-formats-request schema: disclosure_positions.uniqueItems=true"
    reason: "The pinned SDK omits uniqueItems during code generation; sellers must reject, not silently rewrite, duplicate buyer input."
    gherkin: |
      @T-UC-005-ext-b-disclosure-dupes @UC-005-EXT-B-12 @extension @ext-b @error @post-f1
      Scenario: Duplicate disclosure positions are rejected
        Given the Buyer has tenant context
        When the Buyer Agent requests formats with disclosure_positions filter ["prominent", "prominent"]
        Then the duplicate request should fail with a VALIDATION_ERROR wire envelope
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-ext-b-persistence-dupes
    authority: "AdCP 3.1.1 list-creative-formats-request schema: disclosure_persistence.uniqueItems=true"
    reason: "The pinned SDK omits uniqueItems during code generation; sellers must reject, not silently rewrite, duplicate buyer input."
    gherkin: |
      @T-UC-005-ext-b-persistence-dupes @UC-005-EXT-B-18 @extension @ext-b @error @post-f1
      Scenario: Duplicate disclosure persistence modes are rejected
        Given the Buyer has tenant context
        When the Buyer Agent requests formats with disclosure_persistence filter ["continuous", "continuous"]
        Then the duplicate request should fail with a VALIDATION_ERROR wire envelope
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-main-filtered
    authority: "AdCP 3.1.1 media-buy list-creative-formats request schema: properties omit type; additionalProperties=true"
    reason: "The type filter belongs to the creative-agent role, while the media-buy schema remains forward-compatible with extension properties."
    gherkin: |
      @T-UC-005-main-filtered @UC-005-MAIN-MCP-05 @main-flow @post-s3 @schema-contract
      Scenario: Media-buy request does not define the creative-agent type filter
        When the Buyer Agent inspects the media-buy list_creative_formats request contract
        Then the media-buy request contract should not define a type filter
        And the production request models should ignore extension properties
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-partition-type-filter
    authority: "AdCP 3.1.1 media-buy list-creative-formats request schema: additionalProperties=true"
    reason: "Retire the incompatible creative-agent type outline without turning field absence into request-model rejection; production request models ignore extension properties for forward compatibility."
    gherkin: |
      @T-UC-005-partition-type-filter @partition @format_type_filter @schema-contract
      Scenario: Unknown media-buy type extension is ignored by production request models
        When production request-model validation receives media-buy extension field type "invalid_type"
        Then the media-buy type extension should be ignored rather than used as a filter
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-boundary-type-filter
    authority: "AdCP 3.1.1 media-buy list-creative-formats request schema: properties omit type; additionalProperties=true"
    reason: "A value that is valid for the creative-agent role is still only an extension in the media-buy request models and must not become a filter."
    gherkin: |
      @T-UC-005-boundary-type-filter @boundary @format_type_filter @schema-contract
      Scenario: Creative-agent type value remains an ignored media-buy request-model extension
        When production request-model validation receives media-buy extension field type "display"
        Then the media-buy type extension should be ignored rather than used as a filter
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-inv-031-1-holds
    authority: "Pinned AdCP 3.1.1 media-buy list-creative-formats request schema"
    reason: "Use supported asset_types and name_search filters to grade conjunction at the media-buy role boundary."
    gherkin: |
      @T-UC-005-inv-031-1-holds @UC-005-MAIN-MCP-16 @invariant @BR-RULE-031
      Scenario: BR-RULE-031 INV-1 holds - Supported filters combine as AND
        Given the registry has format "display-banner" of type "display" with asset type "image"
        And the registry has format "video-banner" of type "display" with asset type "video"
        And the registry has format "pre-roll" of type "video" with asset type "video"
        When the Buyer Agent requests formats with asset_types ["video"] and name_search "video"
        Then only "video-banner" should be returned
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-inv-031-1-violated
    authority: "Pinned AdCP 3.1.1 media-buy list-creative-formats request schema"
    reason: "Use supported asset_types and name_search filters to prove partial matches are excluded."
    gherkin: |
      @T-UC-005-inv-031-1-violated @UC-005-MAIN-MCP-16 @invariant @BR-RULE-031
      Scenario: BR-RULE-031 INV-1 violated - Supported AND combination excludes partial matches
        Given the registry has format "pre-roll" of type "video" with asset type "video"
        When the Buyer Agent requests formats with asset_types ["video"] and name_search "display"
        Then no formats should be returned
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-inv-031-2-holds
    authority: "Pinned AdCP 3.1.1 Format model"
    reason: "The media-buy response has no type category ordering contract; deterministic ordering is by name."
    gherkin: |
      @T-UC-005-inv-031-2-holds @UC-005-MAIN-MCP-04 @invariant @BR-RULE-031
      Scenario: BR-RULE-031 INV-2 holds - Results sorted by name
        Given the registry has formats:
        | name            | type    |
        | Zebra Banner    | display |
        | Alpha Banner    | display |
        | Pre-Roll        | video   |
        | Audio Spot      | audio   |
        When the Buyer Agent requests all formats with no filters
        Then the results should be sorted by name
  - feature: BR-UC-019-query-media-buys.feature
    scenario_id: T-UC-019-partition-revision
    authority: "AdCP 3.1.1 get-media-buys response revision minimum and monotonicity contract"
    reason: "A seller cannot persist invalid revisions through the production model; test valid revisions produced by the repository mutation seam."
    gherkin: |
      @T-UC-019-partition-revision @partition @revision @schema-v3.1
      Scenario Outline: revision partitions - <partition>
        Given the principal "buyer-001" owns media buy "mb-001" with persisted revision <revision>
        When the Buyer Agent sends a get_media_buys request for media_buy_ids ["mb-001"]
        Then the media buy "mb-001" revision should be <revision>

        Examples:
          | partition        | revision |
          | just_created     | 1        |
          | after_writes     | 5        |
          | later_write      | 7        |
  - feature: BR-UC-019-query-media-buys.feature
    scenario_id: T-UC-019-boundary-revision
    authority: "AdCP 3.1.1 get-media-buys response revision minimum"
    reason: "Revision 1 is the boundary reachable from the production persistence model; malformed stored rows are not protocol input."
    gherkin: |
      @T-UC-019-boundary-revision @boundary @revision @schema-v3.1
      Scenario: revision boundary - minimum inclusive
        Given the principal "buyer-001" owns media buy "mb-001" with persisted revision 1
        When the Buyer Agent sends a get_media_buys request for media_buy_ids ["mb-001"]
        Then the media buy "mb-001" revision should be 1
  - feature: BR-UC-019-query-media-buys.feature
    scenario_id: T-UC-019-partition-confirmed-at
    authority: "AdCP 3.1.1 get-media-buys response confirmed_at contract"
    reason: "Malformed persisted timestamps cannot be created through the production model; test a production-created timestamp on the real query path without post-create mutation."
    gherkin: |
      @T-UC-019-partition-confirmed-at @partition @confirmed_at @schema-v3.1
      Scenario: Production-created media buy carries confirmed_at
        Given the principal "buyer-001" owns media buy "mb-001" with persisted revision 1
        When the Buyer Agent sends a get_media_buys request for media_buy_ids ["mb-001"]
        Then the media buy "mb-001" should include a confirmed_at field
        And the media buy "mb-001" confirmed_at should be an ISO 8601 timestamp
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-partition-disclosure
    authority: "AdCP 3.1.1 list-creative-formats-request schema: disclosure_positions.uniqueItems=true"
    reason: "Duplicate disclosure positions are invalid, not silently deduplicated."
    gherkin: |
      @T-UC-005-partition-disclosure @UC-005-MAIN-MCP-18 @partition @disclosure_positions
      Scenario Outline: Disclosure positions filter partition - <partition>
        Given a seller with formats supporting various disclosure positions
        When the Buyer Agent requests creative formats with disclosure_positions "<partition>"
        Then the disclosure_positions filtering should result in <expected>

        Examples: Valid partitions
          | partition                    | expected |
          | single_position              | valid    |
          | multiple_positions_all_match | valid    |
          | all_positions                | valid    |
          | omitted                      | valid    |
          | no_matching_formats          | valid    |

        Examples: Invalid partitions
          | partition           | expected |
          | unknown_position    | invalid  |
          | empty_array         | invalid  |
  - feature: BR-UC-005-discover-creative-formats.feature
    scenario_id: T-UC-005-boundary-disclosure
    authority: "AdCP 3.1.1 list-creative-formats-request schema: disclosure_positions.uniqueItems=true"
    reason: "Remove the stale silent-dedup narrative; duplicate values are invalid at the request boundary."
    gherkin: |
      @T-UC-005-boundary-disclosure @UC-005-MAIN-MCP-18 @boundary @disclosure_positions
      Scenario Outline: Disclosure positions filter boundary - <boundary_point>
        Given a seller with formats supporting various disclosure positions
        When the Buyer Agent requests creative formats at disclosure boundary "<boundary_point>"
        Then the disclosure handling should be <expected>

        Examples:
          | boundary_point                                         | expected |
          | single position ['prominent'] (min array size)         | valid    |
          | all 8 positions (max meaningful array)                 | valid    |
          | omitted (no filter)                                    | valid    |
          | format has no supported_disclosure_positions (excluded) | valid    |
          | empty array []                                         | invalid  |
          | unknown position string 'sidebar'                      | invalid  |
