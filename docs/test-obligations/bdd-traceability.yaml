# BDD Traceability Mapping
# Links adcp-req BDD scenarios to salesagent obligation IDs.
# This is the single source of truth for cross-repository traceability.
#
# Maintained by: scripts/compile_bdd.py (auto-updates on compilation)
# Manual edits: Only to change status or fix obligation_id mappings
#
# Status lifecycle:
#   new      -> scenario exists in adcp-req but has no salesagent obligation yet
#   mapped   -> scenario linked to an existing salesagent obligation ID
#   stale    -> scenario references behavior salesagent doesn't implement
#   conflict -> scenario contradicts what salesagent actually does
#
# When compile_bdd.py finds a new scenario not in this file, it adds it
# with status: new and obligation_id: null.

