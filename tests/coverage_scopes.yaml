# Scoped coverage configuration
# Each scope maps an AdCP entity to its production source files and test files.
# `scripts/check_scoped_coverage.py` reads this file to run per-scope coverage
# checks and report gaps.
#
# Policy:
#   - Newly developed code (active development this cycle): 100% target
#   - Pre-existing code (legacy, not under active development): 90% minimum
#   - Uncovered lines after full BDD scenario coverage = dead code to remove

scopes:

  # --- Active development (100% target) ---

  creative:
    description: "Creative management, sync, assignments, formats, repository"
    sources:
      - src/core/tools/creatives/_sync.py
      - src/core/tools/creatives/_processing.py
      - src/core/tools/creatives/_assets.py
      - src/core/tools/creatives/_assignments.py
      - src/core/tools/creatives/_validation.py
      - src/core/tools/creatives/_workflow.py
      - src/core/tools/creatives/listing.py
      - src/core/tools/creatives/sync_wrappers.py
      - src/core/tools/creative_formats.py
      - src/core/database/repositories/creative.py
      - src/core/schemas/creative.py
    tests:
      - tests/unit/test_creative.py
      - tests/unit/test_creative_repository.py
      - tests/unit/test_creative_formats_behavioral.py
      - tests/unit/test_creative_response_serialization.py
      - tests/unit/test_creative_status_serialization.py
      - tests/unit/test_creative_agent_registry.py
      - tests/unit/test_creative_conversion_assets.py
      - tests/unit/test_creative_cross_principal_isolation.py
      - tests/unit/test_creative_format_validation_bug.py
      - tests/unit/test_creative_query_tenant_isolation.py
      - tests/integration/test_creative_v3.py
      - tests/integration/test_creative_agent_live.py
      - tests/integration/test_creative_assignment_principal_id.py
      - tests/integration/test_creative_review_model.py
      - tests/integration/test_creative_sync_data_preservation.py
    threshold: 100

  # --- Pre-existing code (90% minimum) ---

  media_buy:
    description: "Media buy CRUD, status management, readiness"
    sources:
      - src/core/tools/media_buy_create.py
      - src/core/tools/media_buy_list.py
      - src/core/tools/media_buy_update.py
      - src/services/media_buy_status_scheduler.py
    tests:
      - tests/unit/test_media_buy.py
      - tests/unit/test_media_buy_create_helpers.py
      - tests/unit/test_media_buy_tenant_context.py
      - tests/integration/test_media_buy_v3.py
      - tests/integration/test_media_buy_readiness.py
      - tests/integration/test_media_buy_repository.py
      - tests/integration/test_media_buy_repository_writes.py
      - tests/integration/test_media_buy_status_scheduler.py
    threshold: 90

  product:
    description: "Product catalog, validation, property filtering"
    sources:
      - src/core/tools/products.py
      - src/core/tools/properties.py
    tests:
      - tests/unit/test_product_adcp36_fields_missing.py
      - tests/unit/test_product_channels_enum.py
      - tests/unit/test_product_format_ids_structure.py
      - tests/unit/test_product_format_validation_admin.py
      - tests/unit/test_product_principal_access.py
      - tests/unit/test_product_property_list_filtering.py
      - tests/unit/test_product_validation.py
    threshold: 90
