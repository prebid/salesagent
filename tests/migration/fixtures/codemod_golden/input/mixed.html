{# Fixture input: mixed — `script_root`, static assets, Flask dotted url_for, in one file. #}
{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ request.script_root }}/static/css/admin.css">
<div class="header">
  <a href="{{ url_for('core.index') }}">Home</a>
  <a href="{{ request.script_root }}/tenant/{{ tenant.tenant_id }}/settings">Settings</a>
</div>
<main>
  <a href="{{ url_for('products.list_products', tenant_id=tenant.tenant_id) }}" class="btn">Products</a>
  <form method="POST" action="{{ request.script_root }}/tenant/{{ tenant.tenant_id }}/deactivate">
    <button>Deactivate</button>
  </form>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</main>
{% endblock %}
